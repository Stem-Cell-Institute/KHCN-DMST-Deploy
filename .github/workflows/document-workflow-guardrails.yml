name: document-workflow-guardrails

on:
  pull_request:
    paths:
      - "modules/document-workflow/**"
      - "frontend/document-workflow-ui/**"
      - "routes/internalDocumentsWorkflow.js"
      - ".github/workflows/document-workflow-guardrails.yml"
      - ".github/pull_request_template.md"
  push:
    branches: [main, REFACTOR]

jobs:
  backend-syntax:
    name: Backend syntax + no-direct-mailSend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Node --check all backend files
        run: |
          set -eu
          find modules/document-workflow -type f -name "*.js" -print0 \
            | xargs -0 -n1 node --check

      - name: Gate - controller must not call mailSend directly
        run: |
          set -eu
          if grep -nE 'mailSend\(' modules/document-workflow/controllers/*.js; then
            echo "::error::Controllers must not call mailSend directly. Publish a domain event and subscribe in application/handlers/."
            exit 1
          fi

      - name: Gate - services/controllers must not use raw DocumentModel outside repository + composition root
        run: |
          set -eu
          OFFENDERS=$(grep -RIl "require.*DocumentModel" modules/document-workflow \
            | grep -vE "^modules/document-workflow/(models|infrastructure|routes)/" \
            || true)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::These files import DocumentModel directly but should use a repository instead:"
            echo "$OFFENDERS"
            exit 1
          fi

  frontend-build-lint:
    name: Frontend build + lint + deprecated-import gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/document-workflow-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/document-workflow-ui/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      - name: Gate - forbid NEW code importing from deprecated paths
        working-directory: .
        run: |
          set -eu
          # Scan TS/TSX sources OUTSIDE the compat shims.
          OFFENDERS=$(grep -RIn --include="*.ts" --include="*.tsx" \
            -E "from ['\"]@/components/admin/AdminPrimitives['\"]|from ['\"]@/components/ui['\"]|from ['\"]@/components/admin/AdminGuard['\"]|from ['\"]@/lib/api['\"]" \
            frontend/document-workflow-ui/src/features frontend/document-workflow-ui/src/shared \
            frontend/document-workflow-ui/src/App.tsx frontend/document-workflow-ui/src/main.tsx \
            2>/dev/null || true)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::New code must not import deprecated paths. Use @/shared/* and @/features/* instead."
            echo "$OFFENDERS"
            exit 1
          fi

  pr-checklist:
    name: PR checklist enforcement
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Require checklist markers in PR body
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const required = [
              "[x] Backend: mailSend duoc publish qua event bus",
              "[x] Backend: khong import DocumentModel ngoai repository",
              "[x] Frontend: khong import `@/components/admin/AdminPrimitives`",
              "[x] Frontend: `npm run build` xanh",
              "[x] Frontend: `npm run lint` xanh",
            ];
            const missing = required.filter((line) => !body.includes(line));
            if (missing.length) {
              core.setFailed(
                "PR body missing required checklist items:\n" + missing.map((m) => "- " + m).join("\n")
              );
            }
