# Nginx: allow multipart uploads up to 20MB (Multer limit on /api/cooperation/thoa-thuan and HTQT routes).
# 25m leaves margin for multipart boundaries and form fields.
#
# Add INSIDE the server { } block that proxies to Node (same server as khcn-dmst), then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# If 413 still appears, check: another server{} without this line, or Cloudflare/orange-proxy limits.

client_max_body_size 25m;
