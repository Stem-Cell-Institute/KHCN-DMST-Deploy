<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thiết bị — Chờ duyệt</title>
  <link rel="stylesheet" href="/public/equipment/equip-layout.css" />
</head>
<body class="eq-body">
  <div class="eq-app">
    <aside class="eq-sidebar">
      <div class="eq-sidebar__brand">STIMS</div>
      <nav class="eq-nav">
        <a href="/public/equipment/index.html">Danh sách thiết bị</a>
        <a class="eq-nav--active" href="/public/equipment/pending.html">Chờ duyệt</a>
        <a href="/index.html">Trang chủ</a>
        <a href="/public/equipment/permissions.html" id="nav-permissions" class="nav-hidden">Quản trị module</a>
      </nav>
      <div id="eq-equipment-notifications" class="eq-equipment-notifications"></div>
    </aside>
    <main class="eq-main">
      <div class="eq-header">
        <div class="eq-header__title">
          <h1>Hồ sơ chờ duyệt</h1>
        </div>
        <div class="eq-header__tail">
          <div id="eq-auth-bar" class="eq-auth-bar" aria-live="polite"></div>
        </div>
      </div>
      <p style="color:var(--eq-muted);font-size:0.9rem;margin-bottom:18px;">Chỉ tài khoản Admin hệ thống.</p>
      <div id="msg"></div>
      <div class="eq-table-wrap">
        <table class="eq-table">
          <thead>
            <tr><th>Mã</th><th>Tên</th><th>Người tạo</th><th>Hành động</th></tr>
          </thead>
          <tbody id="tb"></tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="/public/js/equipmentApi.js"></script>
  <script src="/public/js/equipmentToast.js"></script>
  <script src="/public/js/equipmentNav.js"></script>
  <script src="/js/page-greeting.js"></script>
  <script src="/public/js/equipmentAuthBar.js"></script>
  <script src="/public/js/equipmentNotifications.js"></script>
  <script>
(function () {
  function load() {
    window.equipmentApi.getJson('/pending').then(function (r) {
      if (r.status === 401 || r.status === 403) {
        window.stimsToast && window.stimsToast('Cần quyền Admin', false);
        window.location.href = '/dang-nhap.html?returnUrl=' + encodeURIComponent('public/equipment/pending.html');
        return;
      }
      if (!r.ok) {
        window.stimsToast && window.stimsToast((r.data && r.data.message) || 'Lỗi', false);
        return;
      }
      var tb = document.getElementById('tb');
      tb.innerHTML = '';
      (r.data.data || []).forEach(function (row) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' +
          row.equipment_code +
          '</td><td>' +
          row.name +
          '</td><td>' +
          (row.created_by_name || '') +
          '</td><td><button type="button" class="eq-btn" data-a="y" data-id="' +
          row.id +
          '">Duyệt</button> <button type="button" class="eq-btn eq-btn--danger" data-a="n" data-id="' +
          row.id +
          '">Trả về</button></td>';
        tb.appendChild(tr);
      });
      tb.querySelectorAll('button').forEach(function (b) {
        b.onclick = function () {
          var eid = b.getAttribute('data-id');
          var ok = b.getAttribute('data-a') === 'y';
          if (!ok) {
            var note = window.prompt('Lý do trả về (bắt buộc):');
            if (note === null) return;
            if (!String(note).trim()) {
              window.stimsToast && window.stimsToast('Vui lòng nhập lý do', false);
              return;
            }
          }
          window.equipmentApi
            .sendJson('PATCH', '/' + eid + '/review', {
              decision: ok ? 'approve' : 'reject',
              note: ok ? null : String(note).trim(),
            })
            .then(function (x) {
              if (!x.ok) window.stimsToast && window.stimsToast((x.data && x.data.message) || 'Lỗi', false);
              else {
                window.stimsToast && window.stimsToast(ok ? 'Đã duyệt' : 'Đã trả về', true);
                load();
              }
            });
        };
      });
    });
  }
  load();
})();
  </script>
<script>if (window.equipmentNav && window.equipmentNav.sync) { window.equipmentNav.sync().catch(function () {}); }</script>
</body>
</html>
