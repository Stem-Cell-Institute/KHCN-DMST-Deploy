<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiến trình đề tài - Đề tài ngoài Viện</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body.content-page-timeline { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fa; }
        .timeline-page { max-width: 900px; margin: 0 auto; padding: 30px; }
        .task-header { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .task-code { font-family: monospace; font-size: 14px; color: #667eea; font-weight: 600; margin-bottom: 10px; }
        .task-title { font-size: 24px; font-weight: 600; color: #333; margin-bottom: 15px; }
        .task-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; padding-top: 20px; border-top: 2px solid #e0e0e0; }
        .meta-item { display: flex; flex-direction: column; gap: 5px; }
        .meta-label { font-size: 12px; color: #999; text-transform: uppercase; }
        .meta-value { font-size: 15px; color: #333; font-weight: 600; }
        .phase-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 20px; border-radius: 8px; margin: 30px 0 15px; font-weight: 600; }
        .phase-header:first-of-type { margin-top: 0; }
        .stage-card { background: white; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; border-left: 5px solid #e0e0e0; transition: all 0.3s; }
        .stage-card.completed { border-left-color: #4caf50 !important; }
        .stage-card.active { border-left-color: #ff9800 !important; box-shadow: 0 4px 12px rgba(255, 152, 0, 0.3); }
        .stage-card.pending { border-left-color: #e0e0e0 !important; }
        .stage-header { padding: 18px 22px; display: flex; align-items: center; gap: 15px; }
        .stage-card.completed .stage-header { background: #f1f8f4; }
        .stage-card.active .stage-header { background: #fff8e1; }
        .stage-card.pending .stage-header { background: #fafafa; }
        .stage-card.step-clickable { cursor: pointer; }
        .stage-card.step-clickable:hover .stage-header { background: #e8f5e9 !important; }
        .stage-card.active.step-clickable:hover .stage-header { background: #ffe0b2 !important; }
        .stage-icon { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .stage-card.completed .stage-icon { background: #4caf50; color: white; }
        .stage-card.active .stage-icon { background: #ff9800; color: white; }
        .stage-card.pending .stage-icon { background: #e0e0e0; color: #999; }
        .stage-info { flex: 1; }
        .stage-info h3 { font-size: 16px; color: #333; margin: 0 0 4px 0; }
        .stage-subtitle { font-size: 13px; color: #666; }
        .stage-badge { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-done { background: #e8f5e9; color: #388e3c; }
        .badge-current { background: #fff3e0; color: #e65100; }
        .badge-pending { background: #f5f5f5; color: #999; }
        .empty-state { padding: 3rem 2rem; text-align: center; color: #666; }
        .progress-bar { width: 100%; height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 12px; transition: width 0.5s; }
        .btn-back { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; background: #667eea; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; margin-bottom: 20px; }
        .btn-back:hover { background: #764ba2; }
        .stage-expand { max-height: 0; overflow: hidden; transition: max-height 0.35s ease-out; }
        .stage-card.expanded .stage-expand { max-height: 2500px; transition: max-height 0.4s ease-in; }
        .stage-expand-inner { padding: 20px 22px 22px; background: #f8fdf9; border-top: 1px solid #e0e0e0; }
        .stage-expand-inner .detail-row { margin-bottom: 0.75rem; }
        .stage-expand-inner .detail-label { font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 2px; }
        .stage-expand-inner .detail-value { font-size: 14px; color: #333; }
        .stage-expand-inner .files-list { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #e0e0e0; }
        .stage-expand-inner .file-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: white; border-radius: 8px; margin-bottom: 8px; font-size: 13px; border: 1px solid #e8e8e8; }
        .stage-expand-inner .file-item a { color: #1565c0; text-decoration: none; }
        .stage-expand-inner .file-item a:hover { text-decoration: underline; }
        .stage-expand-toggle { margin-left: auto; font-size: 12px; color: #666; flex-shrink: 0; }
        .btn-step2 { padding: 10px 18px; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; }
        .btn-step2.btn-approve { background: #4caf50; color: white; }
        .btn-step2.btn-approve:hover { background: #43a047; }
        .btn-step2.btn-supplement { background: #ff9800; color: white; }
        .btn-step2.btn-supplement:hover { background: #f57c00; }
        .btn-step2.btn-reject { background: #f44336; color: white; }
        .btn-step2.btn-reject:hover { background: #e53935; }
        .stage-card.expanded .stage-expand-toggle::before { content: '▼ Thu gọn'; }
        .stage-card:not(.expanded) .stage-expand-toggle::before { content: '▶ Xem chi tiết'; }
        .substep-done { color: #4caf50; font-weight: 600; }
        .substep-active { color: #1976d2; font-weight: 600; }
        .substep-pending { color: #999; }
        .buoc4-branch-panel { flex: 1; min-width: 280px; padding: 16px; border-radius: 8px; border: 1px solid #e0e0e0; background: #fff; transition: opacity 0.3s; }
        .buoc4-branch-panel.branch-active { opacity: 1; pointer-events: auto; border-color: #1976d2; box-shadow: 0 0 0 2px rgba(25,118,210,0.2); }
        .buoc4-branch-panel.branch-inactive { opacity: 0.45; pointer-events: none; background: #fafafa; }
        .buoc4-two-branches { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 16px; }
        .btn-reset-buoc4 { margin-top: 24px; padding-top: 20px; border-top: 1px solid #e0e0e0; }
        .btn-reset-buoc4 button { background: #f5f5f5; color: #757575; border: 1px solid #e0e0e0; padding: 8px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .btn-reset-buoc4 button:hover { background: #eeeeee; color: #616161; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.hidden { display: none; }
        .modal-reset { background: white; border-radius: 12px; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .modal-reset .modal-header { padding: 16px 20px; border-bottom: 1px solid #e0e0e0; font-weight: 600; font-size: 16px; }
        .modal-reset .modal-body { padding: 20px; }
        .modal-reset .modal-footer { padding: 16px 20px; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; justify-content: flex-end; }
    </style>
</head>

    <div id="modal-reset-overlay" class="modal-overlay hidden">
        <div class="modal-reset" onclick="event.stopPropagation()">
            <div class="modal-header">Chuyển lại Bước 3 &amp; đổi nhánh</div>
            <div class="modal-body">
                <div id="modal-reset-nhanh-badge" style="margin-bottom:12px;"></div>

                    <label style="display:block;margin:4px 0;"><input type="radio" name="modal_nhanh_moi" value="A"> Nhánh A — Bộ GD/ĐHQG/Trường</label>
                    <label style="display:block;margin:4px 0;"><input type="radio" name="modal_nhanh_moi" value="B"> Nhánh B — Nhà nước/NAFOSTED</label>
                </div>

                    <select id="modal_cap_moi_a" style="width:100%;padding:8px;"><option value="ministry">Bộ GD&amp;ĐT</option><option value="university">ĐHQG-HCM</option><option value="school">Trường ĐHKHTN</option></select>
                </div>
                <div id="modal-reset-cap-b" style="margin-bottom:12px;display:none;"><label style="display:block;font-size:13px;font-weight:500;margin-bottom:4px;">Cấp đề tài mới</label>
                    <select id="modal_cap_moi_b" style="width:100%;padding:8px;"><option value="national">Nhà nước</option><option value="nafosted">NAFOSTED</option><option value="bo_nganh_khac">Bộ ngành khác</option><option value="nhiem_vu_bo_gd">Nhiệm vụ Bộ GD không phải đề tài</option></select>
                </div>
                <div style="margin-bottom:12px;"><label style="display:block;font-size:13px;font-weight:500;margin-bottom:4px;">Lý do thay đổi * (tối thiểu 20 ký tự)</label>
                    <textarea id="modal_ly_do" rows="3" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;" placeholder="Nhập lý do..."></textarea>
                    <span id="modal_ly_do_hint" style="font-size:12px;color:#999;"></span>
                </div>

                <button type="button" id="modal_reset_confirm_btn" disabled style="padding:8px 16px;border:none;border-radius:6px;background:#9e9e9e;color:white;cursor:not-allowed;">Xác nhận</button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var apiBase = (window.location.protocol === 'file:' || (window.location.port && window.location.port !== '3000')) ? 'http://localhost:3000' : '';
        var id = (function() {
            var m = /[?&]id=(\d+)/.exec(window.location.search);
            return m ? parseInt(m[1], 10) : 0;
        })();
        var code = (function() {
            var m = /[?&]code=([^&]+)/.exec(window.location.search);
            return m ? decodeURIComponent(m[1]) : '';
        })();
        var contentEl = document.getElementById('content-area');

        var STATUS_LABELS = {
            planning: 'Lập kế hoạch / Chuẩn bị thuyết minh',
            cho_vien_xet_chon: 'Phòng KHCN kiểm tra & xác nhận nội bộ',
            cho_ct_hd_xet_duyet: 'Chủ tịch HĐ KHCN xét duyệt',
            xet_chon_phe_duyet: 'Xét chọn & phê duyệt',
            buoc4a: 'Xét chọn & phê duyệt (Nhánh A)',
            buoc4b: 'Xét chọn & phê duyệt (Nhánh B)',
            cho_bo_tham_dinh: 'Xét chọn & phê duyệt',
            cho_ngoai_xet_chon: 'Xét chọn & phê duyệt',
            cho_phe_duyet_ngoai: 'Xét chọn & phê duyệt',
            cho_phe_duyet_chinh_thuc: 'Chờ phê duyệt chính thức & hoàn chỉnh thuyết minh',
            da_phe_duyet: 'Chờ phê duyệt chính thức & hoàn chỉnh thuyết minh',
            approved: 'Chờ phê duyệt chính thức & hoàn chỉnh thuyết minh',
            cho_ky_hop_dong: 'Ký hợp đồng',
            khong_duoc_phe_duyet: 'Không được phê duyệt',
            dung_khong_dat_dot: 'Dừng — không đạt đợt này',
            dang_thuc_hien: 'Đang thực hiện (báo cáo 6 tháng/lần)',
            ongoing: 'Đang thực hiện',
            xin_dieu_chinh: 'Xin điều chỉnh nội dung',
            cho_nghiem_thu_co_so: 'Chờ nghiệm thu cơ sở (Viện)',
            nghiem_thu_trung_gian: 'Nghiệm thu cơ sở tại Viện',
            review: 'Nghiệm thu',
            cho_nghiem_thu_bo_nn: 'Chờ nghiệm thu cấp Bộ/Nhà nước',
            nghiem_thu_tong_ket: 'Nghiệm thu cấp Bộ/NN',
            hoan_thien_sau_nghiem_thu: 'Hoàn thiện sau nghiệm thu',
            thanh_ly_hop_dong: 'Thanh lý hợp đồng',
            hoan_thanh: 'Hoàn thành',
            completed: 'Hoàn thành'
        };

        var BUOC4_STATUSES = ['buoc4a','buoc4b','cho_bo_tham_dinh','cho_ngoai_xet_chon','cho_phe_duyet_ngoai'];
        var NHANH_A_LEVELS = ['ministry', 'university', 'school'];
        var BUOC5_STATUSES = ['da_phe_duyet','approved','cho_phe_duyet_chinh_thuc'];
        var ORDER = ['planning','cho_vien_xet_chon','cho_ct_hd_xet_duyet','xet_chon_phe_duyet','cho_phe_duyet_chinh_thuc','cho_ky_hop_dong','khong_duoc_phe_duyet','dung_khong_dat_dot','dang_thuc_hien','ongoing','xin_dieu_chinh','cho_nghiem_thu_co_so','nghiem_thu_trung_gian','review','cho_nghiem_thu_bo_nn','nghiem_thu_tong_ket','hoan_thien_sau_nghiem_thu','thanh_ly_hop_dong','hoan_thanh','completed'];

        var PHASES = [
            { label: 'Giai đoạn 1 — Trước hợp đồng', keys: ['planning','cho_vien_xet_chon','cho_ct_hd_xet_duyet','xet_chon_phe_duyet','cho_phe_duyet_chinh_thuc','cho_ky_hop_dong','khong_duoc_phe_duyet'] },
            { label: 'Giai đoạn 2 — Thực hiện & nghiệm thu', keys: ['dang_thuc_hien','ongoing','xin_dieu_chinh','cho_nghiem_thu_co_so','nghiem_thu_trung_gian','review','cho_nghiem_thu_bo_nn','nghiem_thu_tong_ket','hoan_thien_sau_nghiem_thu','thanh_ly_hop_dong','hoan_thanh','completed'] }
        ];

        var LEVEL_LABELS = { national: 'Cấp Nhà nước', ministry: 'Cấp Bộ', university: 'Cấp ĐHQG', institute: 'Cấp Viện', school: 'Trường ĐHKHTN', nafosted: 'NAFOSTED', bo_nganh_khac: 'Bộ ngành khác', nhiem_vu_bo_gd: 'Nhiệm vụ Bộ GD không phải đề tài' };

        function formatDate(s) {
            if (!s) return '—';
            var d = new Date(s);
            return (d.getDate() + '').padStart(2,'0') + '/' + ((d.getMonth()+1)+'').padStart(2,'0') + '/' + d.getFullYear();
        }
        function formatDateTime(s) {
            if (!s) return '—';
            var d = new Date(s);
            return (d.getDate() + '').padStart(2,'0') + '/' + ((d.getMonth()+1)+'').padStart(2,'0') + '/' + d.getFullYear() + ' ' + (d.getHours() + '').padStart(2,'0') + ':' + (d.getMinutes() + '').padStart(2,'0');
        }

        function formatCurrency(n) {
            if (n == null) return '—';
            return new Intl.NumberFormat('vi-VN').format(n) + ' VNĐ';
        }

        function loadMission() {
            if (!id && !code) {
                contentEl.innerHTML = '<div class="empty-state">Thiếu ID hoặc mã đề tài. Vui lòng truy cập từ trang Nhiệm vụ KHCN.</div>';
                return;
            }
            var url = id ? (apiBase + '/api/missions/' + id + (code ? '?code=' + encodeURIComponent(code) : '')) : (apiBase + '/api/missions/by-code/' + encodeURIComponent(code));
            fetch(url)
                .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
                .then(function(res) {
                    if (!res.ok && res.data && res.data.message && res.data.message.includes('Không tìm thấy') && code && id) {
                        return fetch(apiBase + '/api/missions/by-code/' + encodeURIComponent(code))
                            .then(function(r2) { return r2.json().then(function(d) { return { ok: r2.ok, data: d }; }); });
                    }
                    return res;
                })
                .then(function(res) {
                    if (res.data && res.data.message && res.data.message.includes('Không tìm thấy')) {
                        contentEl.innerHTML = '<div class="empty-state">Không tìm thấy đề tài.</div>';
                        return;
                    }
                    if (res.data && res.data.id) {
                        renderTimeline(res.data);
                    } else {
                        contentEl.innerHTML = '<div class="empty-state">Lỗi tải dữ liệu. Kiểm tra kết nối máy chủ.</div>';
                    }
                })
                .catch(function() {
                    contentEl.innerHTML = '<div class="empty-state">Lỗi tải dữ liệu. Kiểm tra kết nối máy chủ.</div>';
                });
        }

        function renderTimeline(m) {
            var status = m.status || 'planning';
            var statusMap = { approved: 'da_phe_duyet', ongoing: 'dang_thuc_hien', review: 'nghiem_thu_trung_gian', completed: 'hoan_thanh' };
            if (statusMap[status]) status = statusMap[status];
            var statusForStep = status;
            if (BUOC4_STATUSES.indexOf(status) >= 0) statusForStep = 'xet_chon_phe_duyet';
            if (BUOC5_STATUSES.indexOf(status) >= 0) statusForStep = 'cho_phe_duyet_chinh_thuc';
            var idx = ORDER.indexOf(statusForStep);

            var html = '<div class="task-header">';
            html += '<div class="task-code">' + (m.code || '—') + '</div>';
            html += '<div class="task-title">' + (m.title || '—') + '</div>';
            html += '<div class="task-meta">';
            html += '<div class="meta-item"><span class="meta-label">Chủ nhiệm</span><span class="meta-value">' + (m.principal || '—') + '</span></div>';
            html += '<div class="meta-item"><span class="meta-label">Cấp</span><span class="meta-value">' + (LEVEL_LABELS[m.level] || m.level) + '</span></div>';
            var nhanhMeta = m.nhanh || (NHANH_A_LEVELS.indexOf((m.level || '').toLowerCase()) >= 0 ? 'A' : 'B');
            html += '<div class="meta-item"><span class="meta-label">Nhánh</span><span class="meta-value">' + (nhanhMeta === 'A' ? 'A — Bộ GD/ĐHQG/Trường' : 'B — Nhà nước/NAFOSTED') + '</span></div>';
            html += '<div class="meta-item"><span class="meta-label">Trạng thái</span><span class="meta-value">' + (STATUS_LABELS[status] || status) + '</span></div>';
            html += '<div class="meta-item"><span class="meta-label">Thời gian</span><span class="meta-value">' + formatDate(m.start_date) + ' — ' + formatDate(m.end_date) + '</span></div>';
            html += '<div class="meta-item"><span class="meta-label">Tiến độ</span><span class="meta-value">' + (m.progress != null ? m.progress : 0) + '%</span></div>';
            html += '<div class="meta-item"><span class="meta-label">Kinh phí</span><span class="meta-value">' + formatCurrency(m.budget || m.approved_budget) + '</span></div>';
            html += '</div>';
            html += '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.min(100, m.progress || 0) + '%">' + (m.progress || 0) + '%</div></div>';
            html += '</div>';

            var stepNum = 0;
            PHASES.forEach(function(ph) {
                html += '<div class="phase-header">' + ph.label + '</div>';
                ph.keys.forEach(function(key) {
                    stepNum++;
                    var label = 'Bước ' + stepNum + ': ' + (STATUS_LABELS[key] || key);
                    var stepIdx = ORDER.indexOf(key);
                    var isCurrent = key === statusForStep;
                    var isPast = idx >= 0 && stepIdx >= 0 && stepIdx < idx && key !== 'khong_duoc_phe_duyet';
                    var isReject = key === 'khong_duoc_phe_duyet' && status === 'khong_duoc_phe_duyet';
                    var isDone = ['hoan_thanh','completed'].includes(status) && stepIdx >= 0 && stepIdx < ORDER.indexOf('hoan_thanh');
                    var cls = 'stage-card';
                    if (isCurrent || isReject) cls += ' active';
                    else if (isPast || isDone) cls += ' completed';
                    else cls += ' pending';
                    if (key === 'planning' || key === 'cho_vien_xet_chon' || key === 'cho_ct_hd_xet_duyet' || key === 'xet_chon_phe_duyet' || key === 'cho_phe_duyet_chinh_thuc' || key === 'cho_ky_hop_dong') cls += ' step-clickable';

        function loadHoSoNgoaiTimeline(missionId) {
            var listEl = document.getElementById('hoSoNgoaiListTimeline');
            if (!listEl) return;
            fetch(apiBase + '/api/missions/' + missionId + '/ho-so-ngoai')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var files = data.files || [];
                    if (files.length === 0) {
                        listEl.innerHTML = '<p style="color:#999;font-size:13px;">Chưa có hồ sơ nào được nộp.</p>';
                        return;
                    }
                    var html = '<table style="width:100%;font-size:13px;border-collapse:collapse;"><thead><tr style="background:#f8f9fa;"><th style="padding:10px;text-align:left;">File</th><th style="padding:10px;">Ngày nộp</th><th style="padding:10px;">Ghi chú</th><th style="padding:10px;"></th></tr></thead><tbody>';
                    files.forEach(function(f) {
                        var subDate = f.submission_date ? formatDate(f.submission_date) : '—';
                        var note = (f.note || '').trim() ? (f.note || '').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '—';
                        var safeName = (f.original_name || 'file').replace(/"/g, '');
                        html += '<tr style="border-bottom:1px solid #eee;"><td style="padding:10px;">' + (f.original_name || '—').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</td><td style="padding:10px;">' + subDate + '</td><td style="padding:10px;">' + note + '</td><td style="padding:10px;"><button type="button" onclick="window.downloadHoSoNgoaiTimeline(' + missionId + ',' + f.id + ',\'' + safeName.replace(/'/g, "\\'") + '\')" style="font-size:12px;padding:4px 10px;cursor:pointer;border:none;background:#667eea;color:white;border-radius:6px;">Tải</button></td></tr>';
                    });
                    html += '</tbody></table>';
                    listEl.innerHTML = html;
                })
                .catch(function() { listEl.innerHTML = '<p style="color:#c00;font-size:13px;">Lỗi tải danh sách hồ sơ.</p>'; });
        }

        window.submitHoSoNgoaiTimeline = function(e) {
            e.preventDefault();
            var missionId = window._missionIdForHoSo || id || 0;
            if (!missionId) { alert('Thiếu thông tin đề tài.'); return false; }
            var token = localStorage.getItem('token');
            if (!token) { alert('Vui lòng đăng nhập để nộp hồ sơ.'); return false; }
            var fileInput = document.getElementById('hoSoNgoaiFileTimeline');
            if (!fileInput || !fileInput.files || fileInput.files.length === 0) { alert('Vui lòng chọn ít nhất 1 file.'); return false; }
            var fd = new FormData();
            Array.prototype.forEach.call(fileInput.files, function(file) {
                fd.append('files', file);
            });
            var dateVal = document.getElementById('hoSoNgoaiDateTimeline').value;
            if (dateVal) fd.append('submission_date', dateVal);
            var noteVal = (document.getElementById('hoSoNgoaiNoteTimeline') || {}).value.trim();
            if (noteVal) fd.append('note', noteVal);
            var btn = e.target.querySelector('button[type="submit"]');
            if (btn) { btn.disabled = true; btn.textContent = 'Đang nộp...'; }
            fetch(apiBase + '/api/missions/' + missionId + '/ho-so-ngoai', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
                body: fd
            })
                .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
                .then(function(res) {
                    if (btn) { btn.disabled = false; btn.textContent = 'Nộp hồ sơ'; }
                    if (res.ok) {
                        var uploadedCount = (res.data && res.data.files && res.data.files.length) ? res.data.files.length : fileInput.files.length;
                        fileInput.value = '';
                        var dEl = document.getElementById('hoSoNgoaiDateTimeline'); if (dEl) dEl.value = '';
                        var nEl = document.getElementById('hoSoNgoaiNoteTimeline'); if (nEl) nEl.value = '';
                        loadHoSoNgoaiTimeline(missionId);
                        alert(res.data.message || ('Đã lưu ' + uploadedCount + ' hồ sơ.'));
                    } else {
                        alert(res.data.message || 'Nộp hồ sơ thất bại.');
                    }
                })
                .catch(function() {
                    if (btn) { btn.disabled = false; btn.textContent = 'Nộp hồ sơ'; }
                    alert('Lỗi kết nối.');
                });
            return false;
        };

        window.submitBuoc4aLenLich = function(e, missionId) {
            e.preventDefault();
            var form = document.getElementById('formBuoc4aLenLich-' + missionId);
            if (!form) return false;
            var token = localStorage.getItem('token');
            if (!token) { alert('Vui lòng đăng nhập.'); return false; }
            var hopNgay = (form.querySelector('[name="hop_ngay"]') || {}).value;
            var hopHinhThuc = (form.querySelector('input[name="hop_hinh_thuc"]:checked') || {}).value;
            if (!hopNgay || !hopHinhThuc) { alert('Vui lòng điền ngày giờ và hình thức họp.'); return false; }
            var hopDiaDiem = (form.querySelector('[name="hop_dia_diem"]') || {}).value;
            var hopLink = (form.querySelector('[name="hop_link"]') || {}).value;
            if ((hopHinhThuc === 'offline' || hopHinhThuc === 'hybrid') && !hopDiaDiem) { alert('Vui lòng nhập địa điểm họp.'); return false; }
            if ((hopHinhThuc === 'online' || hopHinhThuc === 'hybrid') && !hopLink) { alert('Vui lòng nhập link họp.'); return false; }
            var checkboxes = form.querySelectorAll('input[name="thanh_phan_ids"]:checked');
            var ids = [];
            checkboxes.forEach(function(cb) { ids.push(parseInt(cb.value, 10)); });
            if (ids.length < 2) { alert('Cần chọn ít nhất 2 thành viên Hội đồng.'); return false; }
            var ghiChu = (form.querySelector('[name="ghi_chu"]') || {}).value;
            if (!confirm('Gửi thông báo đến ' + ids.length + ' người?')) return false;
            var btn = form.querySelector('button[type="submit"]');
            if (btn) { btn.disabled = true; btn.textContent = 'Đang gửi...'; }
            fetch(apiBase + '/api/missions/' + missionId + '/buoc4a/len-lich', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ hop_ngay: hopNgay, hop_hinh_thuc: hopHinhThuc, hop_dia_diem: hopDiaDiem || null, hop_link: hopLink || null, thanh_phan_ids: ids, ghi_chu: ghiChu || null })
            })
                .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
                .then(function(res) {
                    if (btn) { btn.disabled = false; btn.textContent = 'Gửi lịch & thông báo →'; }
                    if (res.ok || res.data.success) {
                        alert(res.data.message || 'Đã lên lịch họp.');
                        loadMission(missionId);
                    } else {
                        alert(res.data.message || 'Lỗi.');
                    }
                })
                .catch(function() {
                    if (btn) { btn.disabled = false; btn.textContent = 'Gửi lịch & thông báo →'; }
                    alert('Lỗi kết nối.');
                });
            return false;
        };

                }
            }
            if (!isExpanded && key === 'planning') {
                var listEl = cardEl.querySelector('.planning-files-list');
                if (listEl && listEl.getAttribute('data-loaded') !== '1' && missionId) {
                    listEl.setAttribute('data-loaded', '1');
                    fetch(apiBase + '/api/missions/' + missionId + '/files')
                        .then(function(r) { return r.json(); })
                        .then(function(data) {
                            var files = data.files || [];
                            if (files.length === 0) {
                                listEl.innerHTML = '<p style="color:#999;font-size:13px;">Chưa có file đăng ký.</p>';
                                return;
                            }
                            var token = localStorage.getItem('token');
                            var html = '';
                            files.forEach(function(f) {
                                var name = (f.original_name || 'file').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
                                var label = (f.field_name === 'thuyet_minh_chi_tiet' ? 'Thuyết minh chi tiết' : (f.field_name === 'van_ban_xin_phep_vien_truong' ? 'Văn bản xin phép Viện trưởng' : 'File'));
                                if (token) {
                                    html += '<div class="file-item"><span>' + label + ': ' + name + '</span><a href="#" onclick="window.downloadRegistrationFile(' + missionId + ',' + f.id + ',\'' + name.replace(/'/g, "\\'") + '\'); return false;">Tải xuống</a></div>';
                                } else {
                                    html += '<div class="file-item"><span>' + label + ': ' + name + '</span><span style="color:#999;font-size:12px;">Đăng nhập để tải</span></div>';
                                }
                            });
                            listEl.innerHTML = html;
                        })
                        .catch(function() {
                            listEl.innerHTML = '<p style="color:#c00;font-size:13px;">Lỗi tải danh sách file.</p>';
                        });
                }
            }
        };

        var _resetModalMissionId = 0;
        window.openResetModal = function(missionId, nhanhHienTai, capHienTai) {
            _resetModalMissionId = missionId;
            var overlay = document.getElementById('modal-reset-overlay');
            var badge = document.getElementById('modal-reset-nhanh-badge');
            var nhanhLabel = nhanhHienTai === 'A' ? 'Nhánh A — Bộ GD/ĐHQG/Trường' : 'Nhánh B — Nhà nước/NAFOSTED';
            var badgeColor = nhanhHienTai === 'A' ? '#e3f2fd' : '#f3e5f5';
            var badgeBorder = nhanhHienTai === 'A' ? '#1976d2' : '#7b1fa2';
            badge.innerHTML = '<span style="display:inline-block;padding:6px 12px;border-radius:6px;background:' + badgeColor + ';border-left:4px solid ' + badgeBorder + ';font-weight:600;">Nhánh hiện tại: ' + nhanhLabel + '</span>';
            document.querySelectorAll('input[name="modal_nhanh_moi"]').forEach(function(r) { r.checked = false; });
            document.getElementById('modal-reset-cap-a').style.display = 'none';
            document.getElementById('modal-reset-cap-b').style.display = 'none';
            document.getElementById('modal_ly_do').value = '';
            document.getElementById('modal_ly_do_hint').textContent = '';
            document.getElementById('modal_reset_confirm_btn').disabled = true;
            document.getElementById('modal_reset_confirm_btn').style.background = '#9e9e9e';
            document.getElementById('modal_reset_confirm_btn').style.cursor = 'not-allowed';
            overlay.classList.remove('hidden');
            overlay.onclick = function(e) { if (e.target === overlay) window.closeResetModal(); };
            var updateCapVisibility = function() {
                var v = document.querySelector('input[name="modal_nhanh_moi"]:checked');
                document.getElementById('modal-reset-cap-a').style.display = (v && v.value === 'A') ? 'block' : 'none';
                document.getElementById('modal-reset-cap-b').style.display = (v && v.value === 'B') ? 'block' : 'none';
                window._checkResetModalValid();
            };
            document.querySelectorAll('input[name="modal_nhanh_moi"]').forEach(function(r) {
                r.onchange = updateCapVisibility;
            });
            var checkValid = function() {
                var lyDo = (document.getElementById('modal_ly_do').value || '').trim();
                var nhanh = document.querySelector('input[name="modal_nhanh_moi"]:checked');
                var cap = nhanh && nhanh.value === 'A' ? document.getElementById('modal_cap_moi_a').value : (nhanh && nhanh.value === 'B' ? document.getElementById('modal_cap_moi_b').value : '');
                var ok = lyDo.length >= 20 && nhanh && cap;
                document.getElementById('modal_reset_confirm_btn').disabled = !ok;
                document.getElementById('modal_reset_confirm_btn').style.background = ok ? '#4caf50' : '#9e9e9e';
                document.getElementById('modal_reset_confirm_btn').style.cursor = ok ? 'pointer' : 'not-allowed';
                document.getElementById('modal_ly_do_hint').textContent = lyDo.length > 0 && lyDo.length < 20 ? 'Cần ít nhất 20 ký tự (' + lyDo.length + '/20)' : '';
            };
            window._checkResetModalValid = checkValid;
            document.getElementById('modal_ly_do').oninput = checkValid;
            document.getElementById('modal_cap_moi_a').onchange = checkValid;
            document.getElementById('modal_cap_moi_b').onchange = checkValid;
            document.getElementById('modal_reset_confirm_btn').onclick = function() {
                if (document.getElementById('modal_reset_confirm_btn').disabled) return;
                window.submitResetVeBuoc3(_resetModalMissionId);
            };
        };
        window.closeResetModal = function() {
            document.getElementById('modal-reset-overlay').classList.add('hidden');
        };
        window.submitResetVeBuoc3 = function(missionId) {
            var nhanh = document.querySelector('input[name="modal_nhanh_moi"]:checked');
            var cap = nhanh && nhanh.value === 'A' ? document.getElementById('modal_cap_moi_a').value : (nhanh && nhanh.value === 'B' ? document.getElementById('modal_cap_moi_b').value : '');
            var lyDo = (document.getElementById('modal_ly_do').value || '').trim();
            if (!nhanh || !cap || lyDo.length < 20) return;
            var token = localStorage.getItem('token');
            if (!token) { alert('Vui lòng đăng nhập.'); return; }
            document.getElementById('modal_reset_confirm_btn').disabled = true;
            fetch(apiBase + '/api/missions/' + missionId + '/reset-ve-buoc3', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ nhanh_moi: nhanh.value, cap_moi: cap, ly_do: lyDo })
            })
                .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
                .then(function(res) {
                    window.closeResetModal();
                    if (res.ok) {
                        alert(res.data.message || 'Đã chuyển lại Bước 3.');
                        window._buoc3ForceExpand = true;
                        loadMission();
                        setTimeout(function() {
                            var card = document.querySelector('.stage-card[data-step="cho_ct_hd_xet_duyet"]');
                            if (card && !card.classList.contains('expanded')) {
                                card.classList.add('expanded');
                                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }
                        }, 300);
                    } else {
                        alert(res.data.message || 'Thất bại.');
                        document.getElementById('modal_reset_confirm_btn').disabled = false;
                    }
                })
                .catch(function() {
                    alert('Lỗi kết nối.');
                    document.getElementById('modal_reset_confirm_btn').disabled = false;
                });
        };

        window.step3ExportPhieuPDF = function(missionId) {
            var m = window._missionData;
            if (!m || m.id !== missionId) {
                alert('Đang tải dữ liệu...');
                return;
            }
            var kq = m.buoc3_ket_qua || '';
            var kqLabel = kq === 'dong_y' ? 'Đồng ý cho ban hành hồ sơ' : kq === 'dong_y_co_dieu_kien' ? 'Đồng ý có điều kiện' : kq === 'khong_dong_y' ? 'Không đồng ý' : kq;
            var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Phiếu nhận xét - ' + (m.title || '').replace(/</g,'&lt;') + '</title><style>body{font-family:Segoe UI,sans-serif;padding:24px;max-width:700px;margin:0 auto;} h1{font-size:18px;border-bottom:2px solid #333;padding-bottom:8px;} .row{margin:12px 0;} .label{font-weight:600;font-size:12px;color:#555;margin-bottom:4px;} .value{font-size:14px;}</style></head><body>';
            html += '<h1>PHIẾU NHẬN XÉT CỦA CT HĐ KHCN</h1>';
            html += '<div class="row"><div class="label">Đề tài</div><div class="value">' + (m.title || '—').replace(/</g,'&lt;') + '</div></div>';
            html += '<div class="row"><div class="label">Chủ nhiệm</div><div class="value">' + (m.principal || '—').replace(/</g,'&lt;') + '</div></div>';
            html += '<div class="row"><div class="label">Kết luận</div><div class="value">' + kqLabel + '</div></div>';
            html += '<div class="row"><div class="label">Đánh giá tính khoa học & tính mới</div><div class="value">' + (m.buoc3_nhan_xet_khoa_hoc || '—').replace(/</g,'&lt;').replace(/\n/g,'<br>') + '</div></div>';
            html += '<div class="row"><div class="label">Đánh giá tính khả thi</div><div class="value">' + (m.buoc3_nhan_xet_kha_thi || '—').replace(/</g,'&lt;').replace(/\n/g,'<br>') + '</div></div>';
            html += '<div class="row"><div class="label">Phù hợp định hướng KH&CN Viện</div><div class="value">' + (m.buoc3_nhan_xet_dinh_huong || '—').replace(/</g,'&lt;').replace(/\n/g,'<br>') + '</div></div>';
            html += '<div class="row"><div class="label">Năng lực chủ nhiệm</div><div class="value">' + (m.buoc3_nhan_xet_nang_luc || '—').replace(/</g,'&lt;').replace(/\n/g,'<br>') + '</div></div>';
            if (m.buoc3_dieu_kien) html += '<div class="row"><div class="label">Điều kiện cụ thể</div><div class="value">' + (m.buoc3_dieu_kien || '').replace(/</g,'&lt;').replace(/\n/g,'<br>') + '</div></div>';
            if (m.buoc3_ly_do_tu_choi) html += '<div class="row"><div class="label">Lý do từ chối</div><div class="value">' + (m.buoc3_ly_do_tu_choi || '').replace(/</g,'&lt;').replace(/\n/g,'<br>') + '</div></div>';
            html += '</body></html>';
            var w = window.open('', '_blank');
            w.document.write(html);
            w.document.close();
            w.focus();
            setTimeout(function() { w.print(); }, 300);
        };

        window.downloadRegistrationFile = function(missionId, fileId, filename) {
            var token = localStorage.getItem('token');
            if (!token) { alert('Vui lòng đăng nhập để tải file.'); return; }
            fetch(apiBase + '/api/missions/' + missionId + '/files/' + fileId + '/download', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
                .then(function(r) {
                    if (!r.ok) throw new Error('Lỗi tải file');
                    return r.blob();
                })
                .then(function(blob) {
                    var a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = filename || 'download';
                    a.click();
                    URL.revokeObjectURL(a.href);
                })
                .catch(function() { alert('Lỗi tải file. Kiểm tra đăng nhập.'); });
        };

        loadMission();
    })();
